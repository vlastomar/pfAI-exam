<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Predictor Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="img">
                        <path d="M4 5.5C4 4.7 4.7 4 5.5 4h13c1.3 0 2 1.6 1.1 2.6L15 12v5.4c0 .5-.3 1-.8 1.3l-4 2.1c-.9.5-2-.2-2-1.3V12L3.9 6.6C3.4 6.1 3.5 5.5 4 5.5Z"/>
                    </svg>
                </span>
                <span class="logo-text">Lead<span>Predictor</span></span>
            </div>

            <div class="sidebar-group">
                <label for="language">Language</label>
                <div class="language-select" id="language">
                    <span class="flag-us" aria-hidden="true"></span>
                    <span class="language-text">English</span>
                    <span class="select-arrow" aria-hidden="true"></span>
                </div>
            </div>

            <div class="sidebar-group">
                <label for="currency">Currency</label>
                <select id="currency">
                    <option>$ US Dollar</option>
                </select>
            </div>

            <div class="sidebar-group">
                <label for="startDate">Campaign Start</label>
                <div class="date-field">
                    <input class="date-display" id="startDateDisplay" type="text" value="08-May-2026" readonly>
                    <input class="native-date" id="startDate" type="date" value="2026-05-08" aria-label="Campaign Start">
                    <span class="calendar-icon" aria-hidden="true"></span>
                </div>
            </div>

            <div class="sidebar-group campaign-end-group">
                <label for="endDate">Campaign End</label>
                <div class="date-field">
                    <input class="date-display" id="endDateDisplay" type="text" value="04-Nov-2026" readonly>
                    <input class="native-date" id="endDate" type="date" value="2026-11-04" aria-label="Campaign End">
                    <span class="calendar-icon" aria-hidden="true"></span>
                </div>
            </div>

            <div class="sidebar-group revenue-group">
                <label for="revenue">Total Revenue</label>
                <div class="money-input">
                    <span>$</span>
                    <input type="number" id="revenue" value="10000">
                </div>
            </div>

            <div class="sidebar-group">
                <label for="orderValue">Avg. Order Value</label>
                <div class="money-input">
                    <span>$</span>
                    <input type="number" id="orderValue" value="1000">
                </div>
            </div>
        </aside>

        <main class="main-content">
            <section class="top-panel">
                <div class="chart-area">
                    <canvas id="barChart"></canvas>
                </div>

                <div class="summary-cards">
                    <div class="summary-card prospects">
                        <div class="card-header">
                            <div class="card-title">
                                <span class="icon"><svg viewBox="0 0 24 24" role="img" aria-hidden="true"><path d="M3 7.5C3 6.7 3.7 6 4.5 6h5.8c.5 0 .9.2 1.2.6l1.1 1.4h6.9c.8 0 1.5.7 1.5 1.5v7c0 .8-.7 1.5-1.5 1.5h-15C3.7 18 3 17.3 3 16.5v-9Z"/><path d="M3 10h18v1.7H3z"/></svg></span>
                                <span class="label">Prospects</span>
                            </div>
                            <span class="percent">20%</span>
                        </div>
                        <div class="value" id="prospectsValue">125</div>
                        <div class="progress-bar"><div class="progress" id="prospectsBar"></div></div>
                    </div>

                    <div class="summary-card leads">
                        <div class="card-header">
                            <div class="card-title">
                                <span class="icon"><svg viewBox="0 0 24 24" role="img" aria-hidden="true"><path d="M12 12.5c2.1 0 3.8-1.7 3.8-3.8S14.1 5 12 5 8.2 6.7 8.2 8.7s1.7 3.8 3.8 3.8Z"/><path d="M5.5 19c.7-3.3 3.2-5.2 6.5-5.2s5.8 1.9 6.5 5.2H5.5Z"/></svg></span>
                                <span class="label">Leads</span>
                            </div>
                            <span class="percent">40%</span>
                        </div>
                        <div class="value" id="leadsValue">25</div>
                        <div class="progress-bar"><div class="progress" id="leadsBar"></div></div>
                    </div>

                    <div class="summary-card customers">
                        <div class="card-header">
                            <div class="card-title">
                                <span class="icon"><svg viewBox="0 0 24 24" role="img" aria-hidden="true"><path d="M8 4h8v2h3v2.5c0 2.5-1.6 4.5-4 5.1-.5 1.2-1.5 2.1-2.6 2.4V18h3.1v2h-7v-2h3.1v-2c-1.1-.3-2.1-1.2-2.6-2.4-2.4-.6-4-2.6-4-5.1V6h3V4Zm8 4v3.3c1.1-.5 1.8-1.5 1.8-2.8V8H16ZM6.2 8v.5c0 1.3.7 2.3 1.8 2.8V8H6.2Z"/></svg></span>
                                <span class="label">Customers</span>
                            </div>
                            <span class="percent">8%</span>
                        </div>
                        <div class="value" id="customersValue">10</div>
                        <div class="progress-bar"><div class="progress" id="customersBar"></div></div>
                    </div>
                </div>
            </section>

            <section class="sliders-row">
                <div class="slider-group">
                    <label for="leadRate">Lead Response Rate</label>
                    <input type="range" id="leadRate" min="1" max="100" value="40">
                    <span id="leadRateValue">40.00%</span>
                </div>

                <div class="slider-group">
                    <label for="prospectRate">Prospect Response Rate</label>
                    <input type="range" id="prospectRate" min="1" max="100" value="20">
                    <span id="prospectRateValue">20.00%</span>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
