<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Predictor Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo"> <span class="logo-icon">&#128202;</span> <span class="logo-text">Lead<span class="accent">Predictor</span></span></div>
            <div class="sidebar-group">
                <label>Language</label>
                <select><option>🇺🇸 English</option></select>
            </div>
            <div class="sidebar-group">
                <label>Currency</label>
                <select><option>$ US Dollar</option></select>
            </div>
            <div class="sidebar-group">
                <label>Campaign Start</label>
                <input type="date" value="2026-05-08">
            </div>
            <div class="sidebar-group">
                <label>Campaign End</label>
                <input type="date" value="2026-11-04">
            </div>
            <div class="sidebar-group">
                <label>Total Revenue</label>
                <input type="number" id="revenue" value="10000">
            </div>
            <div class="sidebar-group">
                <label>Avg. Order Value</label>
                <input type="number" id="orderValue" value="1000">
            </div>
        </aside>
        <main class="main-content">
            <div class="top-row">
                <div class="chart-area">
                    <canvas id="barChart"></canvas>
                </div>
                <div class="summary-cards">
                    <div class="summary-card prospects">
                        <div class="icon">&#128188;</div>
                        <div class="label">Prospects</div>
                        <div class="value" id="prospectsValue">125</div>
                        <div class="progress-bar"><div class="progress" id="prospectsBar" style="width:100%"></div></div>
                        <div class="percent">100%</div>
                    </div>
                    <div class="summary-card leads">
                        <div class="icon">&#128100;</div>
                        <div class="label">Leads</div>
                        <div class="value" id="leadsValue">25</div>
                        <div class="progress-bar"><div class="progress" id="leadsBar" style="width:20%"></div></div>
                        <div class="percent">20%</div>
                    </div>
                    <div class="summary-card customers">
                        <div class="icon">&#129351;</div>
                        <div class="label">Customers</div>
                        <div class="value" id="customersValue">10</div>
                        <div class="progress-bar"><div class="progress" id="customersBar" style="width:8%"></div></div>
                        <div class="percent">8%</div>
                    </div>
                </div>
            </div>
            <div class="sliders-row">
                <div class="slider-group">
                    <label for="leadRate">Lead Response Rate</label>
                    <input type="range" id="leadRate" min="1" max="100" value="20">
                    <span id="leadRateValue">20.00%</span>
                </div>
                <div class="slider-group">
                    <label for="prospectRate">Prospect Response Rate</label>
                    <input type="range" id="prospectRate" min="1" max="100" value="40">
                    <span id="prospectRateValue">40.00%</span>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
